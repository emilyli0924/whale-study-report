td{padding:8px;border-top:1px solid #f0f0f0;vertical-align:middle}

.seat-keyboard{background:#e3f2fd;color:#1565c0}.seat-quiet{background:#e8f5e9;color:#2e7d32}
.seat-double{background:#fff3e0;color:#e65100}.seat-quad{background:#fce4ec;color:#c62828}

.btn{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;border:none;transition:all .15s}
.btn-note{background:#e3f2fd;color:#1565c0;padding:4px 14px}
.btn-note:hover{background:#bbdefb}
.btn-wechat{background:#e8f5e9;color:#2e7d32}.btn-wechat:hover{background:#c8e6c9}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.3);z-index:100;justify-content:center;align-items:center}
.modal.show{display:flex}
.modal-box{background:#fff;border-radius:14px;padding:24px;max-width:420px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.modal-box h3{margin-bottom:14px;font-size:16px}
.modal-box label{display:block;font-size:12px;color:#888;margin:8px 0 4px}
.modal-box input,.modal-box textarea,.modal-box select{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px}

.modal-actions{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}

// 备注存储
let NOTES = {};
try { NOTES = JSON.parse(localStorage.getItem('bw_notes')||'{}'); } catch(e) {}

function saveNotes() { localStorage.setItem('bw_notes', JSON.stringify(NOTES)); }

let currentTab = 'seat';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  renderTable();
}

function filterTable() { renderTable(); }

function getFilteredData() {
  let data;
  switch(currentTab) {
    case 'wechat': data = DATA.needWechat; break;
    case 'talk': data = [...DATA.needTalk, ...DATA.warningCustomers]; break;
    default: data = DATA.customers;
  }
  const q = (document.getElementById('search').value || '').toLowerCase();
  if (!q) return data;
  return data.filter(c => (c.nick||'').toLowerCase().includes(q) || (c.phone||'').includes(q));
}

function seatTag(area) {
  const map = { '键盘区':'seat-keyboard','静音区':'seat-quiet','双人间':'seat-double','四人间':'seat-quad','大会议室（8-10人间）':'seat-conf' };
  const cls = map[area] || 'seat-quiet';
  return `<span class="seat-tag ${cls}">${area}</span>`;
}

function renderSummary() {
  const d = DATA;
  document.getElementById('summary').innerHTML = `
    <div class="card blue"><div class="val">${d.totalVisit}</div><div class="lbl">今日到店</div></div>
    <div class="card green"><div class="val">${d.newCount}</div><div class="lbl">新客</div></div>
    <div class="card orange"><div class="val">${d.wechatCount}</div><div class="lbl">待加微信</div></div>
    <div class="card red"><div class="val">${d.talkCount}</div><div class="lbl">需沟通</div></div>
  `;
}

function renderTable() {
  const data = getFilteredData();
  const tab = currentTab;

  if (tab === 'seat') return renderSeatTable(data);
  if (tab === 'wechat') return renderWechatTable(data);
  if (tab === 'talk') return renderTalkTable(data);
  if (tab === 'notes') return renderNotesTable();
}

function renderSeatTable(data) {
  const rows = data.map(c => {
    const here = c.isHere;
    const statusBadge = here ? '<span class="badge badge-here">🟢 在座</span>' : '<span class="badge badge-left">⚪ 已离</span>';
    const newBadge = c.isNew ? '<span class="badge badge-new">🆕</span>' : '';
    const memberBadge = c.member ? '<span class="badge badge-member">会员</span>' : '<span class="badge badge-nomember">非会员</span>';
    const wechatIcon = c.hasWechat ? '✅' : '<span style="color:#db4437">⚠️</span>';
    const seats = (c.seats||[]).map(s => `${seatTag(s.area)}${s.start}-${s.end||'至今'}`).join('<br>') || '-';
    const note = NOTES[c.phone];
    const noteDot = note ? ' <span style="color:#1a73e8;font-size:10px">📝</span>' : '';
    const typeStr = c.customerType ? `<span style="font-size:11px;color:#888">${c.customerType}</span>` : '';
    return `<tr>
      <td>${statusBadge} ${newBadge} ${c.nick||'未知'}${noteDot}<br>${typeStr}</td>
      <td>${c.phone}</td>
      <td>${seats}</td>
      <td>${wechatIcon} ${memberBadge}</td>
      <td><button class="btn btn-note" onclick="openNote('${c.phone}','${(c.nick||'').replace(/'/g,"\\'")}')">📝 备注</button></td>
    </tr>`;
  }).join('');
  document.getElementById('tableContainer').innerHTML = `<table><thead><tr>
    <th>客户</th><th>手机号</th><th>座位·时间</th><th>微信·会员</th><th>操作</th>
  </tr></thead><tbody>${rows||'<tr><td colspan="5" style="text-align:center;color:#999">暂无数据</td></tr>'}</tbody></table>`;
}

function renderWechatTable(data) {
  const rows = data.map(c => `<tr>
    <td>${c.nick||'未知'}</td><td>${c.phone}</td><td>${c.source||'-'}</td><td>${c.visitDays||0}次</td>
    <td>${c.customerType||'-'}</td><td><button class="btn btn-note" onclick="openNote('${c.phone}','${(c.nick||'').replace(/'/g,"\\'")}')">📝 备注</button></td>
  </tr>`).join('');
  document.getElementById('tableContainer').innerHTML = `<table><thead><tr>
    <th>微信名</th><th>手机号</th><th>来源</th><th>到访</th><th>类型</th><th>操作</th>
  </tr></thead><tbody>${rows||'<tr><td colspan="6" style="text-align:center;color:#999">暂无</td></tr>'}</tbody></table>`;
}

function renderTalkTable(data) {
  const rows = data.map(c => `<tr>
    <td>${c.nick||'未知'}</td><td>${c.phone}</td>
    <td>${c.reason||'待转化(来≥3次非会员)'}</td>
    <td>${c.visitDays||0}次</td>
    <td><button class="btn btn-note" onclick="openNote('${c.phone}','${(c.nick||'').replace(/'/g,"\\'")}')">📝 备注</button></td>
  </tr>`).join('');
  document.getElementById('tableContainer').innerHTML = `<table><thead><tr>
    <th>客户</th><th>手机号</th><th>原因</th><th>到访</th><th>操作</th>
  </tr></thead><tbody>${rows||'<tr><td colspan="5" style="text-align:center;color:#999">暂无</td></tr>'}</tbody></table>`;
}

function renderNotesTable() {
  const notes = Object.entries(NOTES).filter(([_,v]) => v && v.trim());
  const rows = notes.map(([phone, text]) => {
    const c = DATA.customers.find(x => x.phone === phone) || {};
    return `<tr><td>${c.nick||'未知'}</td><td>${phone}</td><td>${text}</td><td><button class="btn btn-note" onclick="openNote('${phone}','${(c.nick||'').replace(/'/g,"\\'")}')">编辑</button></td></tr>`;
  }).join('');
  document.getElementById('tableContainer').innerHTML = `<table><thead><tr><th>客户</th><th>手机号</th><th>备注内容</th><th>操作</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="4" style="text-align:center;color:#999">暂无备注</td></tr>'}</tbody></table>`;
}

function openNote(phone, nick) {
  const note = NOTES[phone] || '';
  document.getElementById('noteBox').innerHTML = `
    <h3>${nick || phone} 的备注</h3>
    <textarea id="noteText" placeholder="记录跟进内容、沟通要点、客户偏好...">${note}</textarea>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeNote()">取消</button>
      <button class="btn btn-save" onclick="saveNote('${phone}')">💾 保存</button>
    </div>`;
  document.getElementById('noteModal').classList.add('show');
  setTimeout(() => document.getElementById('noteText').focus(), 100);
}

function closeNote() { document.getElementById('noteModal').classList.remove('show'); }

function saveNote(phone) {
  const text = document.getElementById('noteText').value.trim();
  if (text) NOTES[phone] = text; else delete NOTES[phone];
  saveNotes();
  closeNote();
  renderTable();
  renderSummary();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeNote(); });

// init
renderSummary();
renderTable();
</script></body></html>
