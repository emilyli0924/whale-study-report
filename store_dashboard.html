function data() {
  let d;
  switch(curTab) {

    case 'notes': return []; break;
    default: d = D.customers;

}

  }
  // 会议室
  const meetAreas = ['双人间','四人间','大会议室（8-10人间）'].filter(a => groups[a] && groups[a].length);
  if (meetAreas.length) {
    html += '<div class="section-title" style="margin-top:14px">🏢 会议室</div>';
    meetAreas.forEach(a => {
      html += `<div style="font-size:12px;color:#888;padding:4px 0 2px">${a} · ${groups[a].length}人</div>`;
      html += '<table><thead><tr><th>客户</th><th>手机</th><th>时段</th><th>时长</th><th>微信·会员</th><th>沟通</th><th>操作</th></tr></thead><tbody>';
      html += groups[a].join('') + '</tbody></table>';
    });
  }
  return html || '<div style="color:#999;padding:20px;text-align:center">暂无到店数据</div>';
}

function renderFlat(list, extraCols) {
  const rows = list.map(c => {
    const here = c.isHere ? '<span class="badge badge-here">🟢</span>' : '';
    const note = NOTES[c.phone] ? ' 📝' : '';
    const ex = extraCols.map(f => `<td>${f(c)}</td>`).join('');
    return `<tr><td>${c.nick||'未知'}${note}<br><span style="font-size:10px;color:#888">${c.customerType||''}</span></td><td>${c.phone}</td>${ex}<td>${wcBadge(c)}</td><td>${cmBadge(c)}</td><td><button class="btn btn-note" onclick="openNote('${c.phone}','${(c.nick||'').replace(/'/g,"’")}')">📝</button></td></tr>`;
  }).join('');
  return rows || '<tr><td colspan="10" style="text-align:center;color:#999">暂无</td></tr>';
}

function renderNotes() {
  const ns = Object.entries(NOTES).filter(([_,v]) => v && v.trim());
  const rows = ns.map(([p,t]) => {
    const c = D.customers.find(x => x.phone === p) || { nick: '', phone: p };
    return `<tr><td>${c.nick||''}</td><td>${p}</td><td>${t}</td><td><button class="btn btn-note" onclick="openNote('${p}','${(c.nick||'').replace(/'/g,"’")}')">编辑</button></td></tr>`;
  }).join('');
  return `<table><thead><tr><th>客户</th><th>手机</th><th>备注</th><th>操作</th></tr></thead><tbody>${rows||'<tr><td colspan="4" style="text-align:center;color:#999">暂无备注</td></tr>'}</tbody></table>`;
}

function render() {
  const d = data();
  const el = document.getElementById('tableContainer');
  if (curTab === 'seat') { el.innerHTML = zoneGroup(d); }
  else if (curTab === 'wechat') { el.innerHTML = '<table><thead><tr><th>微信名</th><th>手机</th><th>来源</th><th>到访</th><th>微信状态</th><th>沟通</th><th>操作</th></tr></thead><tbody>' + renderFlat(d, [c => c.source||'-', c => c.visitDays+'次']) + '</tbody></table>'; }
  else if (curTab === 'talk') { el.innerHTML = '<table><thead><tr><th>客户</th><th>手机</th><th>原因</th><th>到访</th><th>微信状态</th><th>沟通</th><th>操作</th></tr></thead><tbody>' + renderFlat(d, [c => c.reason||'待转化', c => c.visitDays+'次']) + '</tbody></table>'; }
  else if (curTab === 'notes') { el.innerHTML = renderNotes(); }
}

function renderSummary() {
  document.getElementById('summary').innerHTML = `
    <div class="card blue"><div class="val">${D.totalVisit}</div><div class="lbl">今日到店</div></div>
    <div class="card green"><div class="val">${D.newCount}</div><div class="lbl">新客</div></div>
    <div class="card orange"><div class="val">${D.wechatCount}</div><div class="lbl">待加微信</div></div>
    <div class="card red"><div class="val">${D.talkCount}</div><div class="lbl">需沟通</div></div>
  `;
}

// wechat status popover
let wcPhone = '';
function toggleWc(e, phone) {
  e.stopPropagation();
  closePops();
  wcPhone = phone;
  const cur = sWc[phone] || D.customers.find(c=>c.phone===phone)?.wechatStatus || 'not_added';
  const el = document.getElementById('wcPop');
  el.innerHTML = Object.entries(WC).map(([k,v]) => `<div class="${k===cur?'':'style="color:#888"''}" onclick="setWc('${k}')">${k===cur?'✅ ':''}${v}</div>`).join('');
  const rect = e.target.getBoundingClientRect();
  el.style.left = rect.left + 'px'; el.style.top = (rect.bottom+4) + 'px'; el.style.display = 'block';
}
function setWc(st) { sWc[wcPhone] = st; saveWc(); closePops(); render(); }
function toggleCm(e, phone) {
  e.stopPropagation();
  closePops();
  wcPhone = phone;
  const cur = sCm[phone] || (curTab==='talk' ? (!data().find(c=>c.phone===phone)?.isHere ? 'invite' : (D.isAfterCutoff?'followup':'welcome')) : D.customers.find(c=>c.phone===phone)?.commStatus || 'followup');
  const el = document.getElementById('cmPop');
  el.innerHTML = Object.entries(CM).map(([k,v]) => `<div class="${k===cur?'':'style="color:#888"''}" onclick="setCm('${k}')">${k===cur?'✅ ':''}${v}</div>`).join('');
  const rect = e.target.getBoundingClientRect();
  el.style.left = rect.left + 'px'; el.style.top = (rect.bottom+4) + 'px'; el.style.display = 'block';
}
function setCm(st) { sCm[wcPhone] = st; saveCm(); closePops(); render(); }
function closePops() { document.getElementById('wcPop').style.display='none'; document.getElementById('cmPop').style.display='none'; }
document.addEventListener('click', closePops);

// notes modal
function openNote(phone, nick) {
  const t = NOTES[phone] || '';
  const m = document.createElement('div');
  m.className = 'modal';
  m.innerHTML = `<div class="modal-box"><h3>${nick||phone} 的备注</h3>
    <textarea id="nt" style="width:100%;min-height:100px;padding:8px;border:1px solid #ddd;border-radius:8px;font-size:13px" placeholder="沟通要点、客户偏好...">${t}</textarea>
    <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end">
      <button onclick="this.closest('.modal').remove()" style="background:#f5f5f5;border:none;padding:8px 20px;border-radius:6px;cursor:pointer">取消</button>
      <button onclick="(function(){
        const v=document.getElementById('nt').value.trim();
        if(v) NOTES['${phone}']=v; else delete NOTES['${phone}'];
        saveNotes(); this.closest('.modal').remove(); render(); renderSummary();
      })()" style="background:#1a73e8;color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer">💾 保存</button>
    </div></div>`;
  m.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.3);z-index:100;display:flex;justify-content:center;align-items:center';
  m.querySelector('.modal-box').style.cssText = 'background:#fff;border-radius:14px;padding:24px;max-width:420px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.15)';
  document.body.appendChild(m);
  m.addEventListener('click', e => { if (e.target === m) m.remove(); });
  setTimeout(() => m.querySelector('textarea').focus(), 100);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { closePops(); document.querySelector('.modal')?.remove(); } });

renderSummary(); render();
</script></body></html>
