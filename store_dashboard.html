    if(groups[a].gone.length){groups[a].gone.sort(function(a,b){var sa=a.seats[0]||{},sb=b.seats[0]||{};return (sa.start||'').localeCompare(sb.start||'');});
      html+='<div style="font-size:12px;color:#888;padding:4px 0">⚪ 已离 · '+groups[a].gone.length+' 人</div>';
      html+='<table><thead><tr><th>座位</th><th>姓名</th><th>时间</th><th>时长</th><th>会员</th><th>微信</th><th>沟通</th><th>画像/备注</th></tr></thead><tbody>'+groups[a].gone.map(seatRow).join('')+'</tbody></table>';
    }
  });
  return html;
}
function wechatTableHtml(list){if(!list.length)return '<div style="color:#999;padding:20px;text-align:center">🎉 所有到店客户都已加微信</div>';
  var rows=list.map(function(c){var nick=esc(c.nick||'').replace(/'/g,'\\u2019');return '<tr><td>'+esc(c.nick||'未知')+'</td><td>'+c.phone+'</td><td>'+esc(c.source||'-')+'</td><td>'+c.visitDays+'次</td><td>'+esc(c.customerType||'-')+'</td><td>'+wcBadgeHtml(c)+'</td><td>'+cmBadgeHtml(c)+'</td><td><button class="btn" onclick="openNote(\''+c.phone+'\',\''+nick+'\')">📝</button></td></tr>';}).join('');
  return '<table><thead><tr><th>微信名</th><th>手机</th><th>来源</th><th>到访</th><th>类型</th><th>微信状态</th><th>沟通</th><th>操作</th></tr></thead><tbody>'+rows+'</tbody></table>';
}
function talkTableHtml(list){if(!list.length)return '<div style="color:#999;padding:20px;text-align:center">暂无待沟通客户</div>';
  var rows=list.map(function(c){var nick=esc(c.nick||'').replace(/'/g,'\\u2019');return '<tr><td>'+esc(c.nick||'未知')+'</td><td>'+c.phone+'</td><td>'+esc(c.reason||'待转化')+'</td><td>'+c.visitDays+'次</td><td>'+wcBadgeHtml(c)+'</td><td>'+cmBadgeHtml(c)+'</td><td><button class="btn" onclick="openNote(\''+c.phone+'\',\''+nick+'\')">📝</button></td></tr>';}).join('');
  return '<table><thead><tr><th>客户</th><th>手机</th><th>原因</th><th>到访</th><th>微信状态</th><th>沟通</th><th>操作</th></tr></thead><tbody>'+rows+'</tbody></table>';
}
function notesTableHtml(){var ns=Object.entries(NOTES).filter(function(e){return e[1]&&e[1].trim();});if(!ns.length)return '<div style="color:#999;padding:20px;text-align:center">暂无备注，点客户行的 📝 按钮添加</div>';
  var rows=ns.map(function(e){var p=e[0],t=e[1];var c=D.customers.find(function(x){return x.phone===p;})||{nick:'',phone:p};var nick=esc(c.nick||'').replace(/'/g,'\\u2019');return '<tr><td>'+esc(c.nick||'')+'</td><td>'+p+'</td><td style="max-width:400px;white-space:pre-wrap">'+esc(t)+'</td><td><button class="btn" onclick="openNote(\''+p+'\',\''+nick+'\')">编辑</button></td></tr>';}).join('');
  return '<table><thead><tr><th>客户</th><th>手机</th><th>备注</th><th>操作</th></tr></thead><tbody>'+rows+'</tbody></table>';
}
function data(){var d;if(curTab==='wechat')d=D.needWechat;else if(curTab==='talk')d=D.talkCustomers;else if(curTab==='notes')return [];else d=D.customers;
  var q=(document.getElementById('search').value||'').toLowerCase();if(!q)return d;return d.filter(function(c){return (c.nick||'').toLowerCase().includes(q)||(c.phone||'').includes(q);});
}
function render(){var d=data();var el=document.getElementById('tableContainer');if(curTab==='seat')el.innerHTML=zoneGroupHtml(d);else if(curTab==='wechat')el.innerHTML=wechatTableHtml(d);else if(curTab==='talk')el.innerHTML=talkTableHtml(d);else if(curTab==='notes')el.innerHTML=notesTableHtml();}
function renderSummary(){document.getElementById('summary').innerHTML='<div class="card blue"><div class="val">'+D.totalVisit+'</div><div class="lbl">今日到店</div></div><div class="card green"><div class="val">'+D.newCount+'</div><div class="lbl">新客</div></div><div class="card orange"><div class="val">'+D.wechatCount+'</div><div class="lbl">待加微信</div></div><div class="card red"><div class="val">'+D.talkCount+'</div><div class="lbl">需沟通</div></div>';}
var popPhone='';
function openWc(e,phone){e.stopPropagation();closePops();popPhone=phone;var st=curWc({phone:phone,wechatStatus:'not_added'});
  var el=document.getElementById('wcPop');
  el.innerHTML=Object.entries(WC).map(function(e){return '<div onclick="setWc(\''+e[0]+'\')"'+(e[0]===st?' style="font-weight:600;color:#1a73e8"':'')+'>'+(e[0]===st?'✓ ':'')+e[1]+'</div>';}).join('');
  var r=e.target.getBoundingClientRect();el.style.left=r.left+'px';el.style.top=(r.bottom+4)+'px';el.style.display='block';
}
function setWc(st){sWc[popPhone]=st;saveWc();closePops();render();}
function openCm(e,phone){e.stopPropagation();closePops();popPhone=phone;var c=D.customers.find(function(x){return x.phone===phone;})||{};var st=curCm(c);
  var el=document.getElementById('cmPop');
  el.innerHTML=Object.entries(CM).map(function(e){return '<div onclick="setCm(\''+e[0]+'\')"'+(e[0]===st?' style="font-weight:600;color:#1a73e8"':'')+'>'+(e[0]===st?'✓ ':'')+e[1]+'</div>';}).join('');
  var r=e.target.getBoundingClientRect();el.style.left=r.left+'px';el.style.top=(r.bottom+4)+'px';el.style.display='block';
}
function setCm(st){sCm[popPhone]=st;saveCm();closePops();render();}
function closePops(){document.getElementById('wcPop').style.display='none';document.getElementById('cmPop').style.display='none';}
document.addEventListener('click',closePops);
function openNote(phone,nick){document.querySelectorAll('.modal-bg').forEach(function(m){m.remove();});
  var t=NOTES[phone]||'';
  var m=document.createElement('div');m.className='modal-bg';
  m.innerHTML='<div class="modal-box"><h3 style="margin-bottom:4px">'+esc(nick||phone)+' 的备注</h3><div style="font-size:12px;color:#888">'+phone+'</div><textarea id="nt">'+esc(t)+'</textarea><div class="modal-actions"><button class="btn-cancel" onclick="this.closest(\'.modal-bg\').remove()">取消</button><button class="btn-save" onclick="saveNote(\''+phone+'\')">💾 保存</button></div></div>';
  document.body.appendChild(m);
  m.addEventListener('click',function(e){if(e.target===m)m.remove();});
  setTimeout(function(){var t=document.getElementById('nt');if(t)t.focus();},100);
}
function saveNote(phone){var v=document.getElementById('nt').value.trim();if(v)NOTES[phone]=v;else delete NOTES[phone];saveNotes();document.querySelector('.modal-bg').remove();render();}
function openProfile(phone,nick){document.querySelectorAll('.modal-bg').forEach(function(m){m.remove();});
  var prof=PROFILES[phone]||{gender:'',type:'',grade:'',note:''};
  var selG=['','男','女'].map(function(v){return '<option value="'+v+'"'+(prof.gender===v?' selected':'')+'>'+(v||'不涉及')+'</option>';}).join('');
  var selT=['','家长','学生','老师','成人办公','其他'].map(function(v){return '<option value="'+v+'"'+(prof.type===v?' selected':'')+'>'+(v||'不涉及')+'</option>';}).join('');
  var selR=['','小学','初高中','大学','研究生'].map(function(v){return '<option value="'+v+'"'+(prof.grade===v?' selected':'')+'>'+(v||'不涉及')+'</option>';}).join('');
  var m=document.createElement('div');m.className='modal-bg';
  m.innerHTML='<div class="modal-box" style="max-width:360px"><h3>👤 '+esc(nick||phone)+'</h3><div style="font-size:12px;color:#888;margin-bottom:8px">'+phone+'</div>'
    +'<label style="font-size:12px;color:#888">性别</label><select id="pf_gender" style="width:100%;padding:6px;border:1px solid #ddd;border-radius:6px;font-size:13px">'+selG+'</select>'
    +'<label style="font-size:12px;color:#888">类型</label><select id="pf_type" style="width:100%;padding:6px;border:1px solid #ddd;border-radius:6px;font-size:13px">'+selT+'</select>'
    +'<label style="font-size:12px;color:#888">年级</label><select id="pf_grade" style="width:100%;padding:6px;border:1px solid #ddd;border-radius:6px;font-size:13px">'+selR+'</select>'
    +'<label style="font-size:12px;color:#888">备注</label><textarea id="pf_note" style="width:100%;min-height:60px;padding:6px;border:1px solid #ddd;border-radius:6px;font-size:13px">'+esc(prof.note||'')+'</textarea>'
    +'<div class="modal-actions"><button class="btn-cancel" onclick="this.closest(\'.modal-bg\').remove()">取消</button><button class="btn-save" onclick="saveProfile(\''+phone+'\')">💾 保存画像</button></div></div>';
  document.body.appendChild(m);
  m.addEventListener('click',function(e){if(e.target===m)m.remove();});
}
function saveProfile(phone){var pf={gender:document.getElementById('pf_gender').value,type:document.getElementById('pf_type').value,grade:document.getElementById('pf_grade').value,note:document.getElementById('pf_note').value.trim()};if(pf.gender||pf.type||pf.grade||pf.note)PROFILES[phone]=pf;else delete PROFILES[phone];saveProfiles();document.querySelector('.modal-bg').remove();render();}
document.addEventListener('keydown',function(e){if(e.key==='Escape'){closePops();var m=document.querySelector('.modal-bg');if(m)m.remove();}});
renderSummary();render();
</script></body></html>
