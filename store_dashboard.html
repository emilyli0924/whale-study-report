  else if(isMeeting){if(done||greyed||expired)btnHtml='';else btnHtml='<button class="btn btn-done" onclick="markMeetingSent(\''+t.phone+'\',\''+t.room+'\',\''+t.start+'\')">✅ 已发送</button>';}
  else if(t.type==='followup'){var fupDone=isDone(t);var gifted=GIFT[t.phone];if(fupDone&&gifted)btnHtml='<span class="status-badge status-done">🎁 已赠送</span>';else if(fupDone)btnHtml='<button class="btn btn-done" onclick="markFupGift(\''+t.phone+'\')">🎁 已赠送</button>';else if(!confirmed)btnHtml='<button class="btn btn-done" onclick="markFollowupDone(\''+t.phone+'\')">✅ 已发送</button><button class="btn btn-skip" onclick="confirmMember(\''+t.phone+'\')">🏷 标记为会员</button>';else btnHtml='<span class="status-badge status-done">✅ 已标记会员</span><button class="btn btn-done" onclick="markFollowupDone(\''+t.phone+'\')">✅ 已发送</button>';}
  else btnHtml='<button class="btn btn-done" onclick="markAsDone('+JSON.stringify(t)+')">✅ 标记完成</button>';
  return '<div class="'+cls+'"><div class="task-name">'+name+' '+statusHtml+'</div><div class="task-info">'+info.join(' · ')+'</div>'+bodyHtml+'<div class="task-actions">'+btnHtml+'</div></div>';
}
function confirmMember(phone){CONFIRMED[phone]=new Date().toISOString();localStorage.setItem('bw_confirmed',JSON.stringify(CONFIRMED));render();}
function unconfirmMember(phone){delete CONFIRMED[phone];localStorage.setItem('bw_confirmed',JSON.stringify(CONFIRMED));render();}
function markWechatAdded(phone){sWc[phone]='added';localStorage.setItem('bw_wc',JSON.stringify(sWc));var t=D.tasks.find(function(x){return x.phone===phone&&x.type==='wechat';});if(t)markAsDone(t);else{render();}}
function markMeetingSent(phone,room,start){var t=D.tasks.find(function(x){return x.type==='meeting_remind'&&x.phone===phone&&x.room===room&&x.start===start;});if(t)markAsDone(t);else{alert('未找到任务');}}
function markFollowupDone(phone){var t=D.tasks.find(function(x){return x.type==='followup'&&x.phone===phone;});if(t)markAsDone(t);else{alert('未找到任务');}}
let FUP_STATUS={};try{FUP_STATUS=JSON.parse(localStorage.getItem('bw_fup')||'{}');}catch(e){}
let GIFT={};try{GIFT=JSON.parse(localStorage.getItem('bw_gift')||'{}');}catch(e){}
function setFupStatus(phone,st){FUP_STATUS[phone]=st;localStorage.setItem('bw_fup',JSON.stringify(FUP_STATUS));render();}
function markFupGift(phone){GIFT[phone]=1;localStorage.setItem('bw_gift',JSON.stringify(GIFT));curFupTab='done';showToast('🎁 已赠送，查看已完成Tab');render();}
let curMeetTab='need';function setMeetTab(k){curMeetTab=k;render();}
let curFupTab='pending';function setFupTab(k){curFupTab=k;render();}
function renderTasks(){var order=[['wechat','📱 添加微信'],['confirm','🔍 待确认会员'],['meeting','📢 会议室提醒'],['followup','📞 回访（17:00后处理）']];
  var html='';var any=false;
  order.forEach(function(e){var t=e[0],lbl=e[1];var items;
    if(t==='meeting'){items=D.tasks.filter(function(x){return x.type==='meeting_remind';});if(!items.length)return;any=true;
      var needRemind=items.filter(function(x){return!isDone(x)&&!x.isHere&&!isMeetingExpired(x.start);});
      var done=items.filter(function(x){return isDone(x);});
      var arrived=items.filter(function(x){return!isDone(x)&&(x.isHere||isMeetingExpired(x.start));});
      subHtml='<div class="section"><div class="sec-hdr">'+lbl+'</div><div class="sub-tabs">';
      var tabs=[['need','⏰ 需提醒',needRemind.length],['done','✅ 已完成',done.length],['arrived','🟢 已到店',arrived.length]];
      tabs.forEach(function(tb){var k=tb[0],n=tb[1],c=tb[2];var cls='sub-tab'+(curMeetTab===k?' active':'');subHtml+='<div class="'+cls+'" onclick="setMeetTab(\''+k+'\')">'+n+' · '+c+'</div>';});
      subHtml+='</div>';
      var curItems=curMeetTab==='done'?done:curMeetTab==='arrived'?arrived:needRemind;
      if(curItems.length){
        curItems.sort(function(a,b){return b.start.localeCompare(a.start);}).forEach(function(t){subHtml+=taskHtml(t);});
      }else{subHtml+='<div style="padding:14px;color:#999;font-size:12px;text-align:center">这一组暂无任务</div>';}
      subHtml+='</div>';html+=subHtml;return;
    }
    else if(t==='followup'){items=D.tasks.filter(function(x){return x.type==='followup';});if(!items.length)return;any=true;
      var pending=items.filter(function(x){return!isDone(x);});
      var reviewTab=items.filter(function(x){return isDone(x)&&!GIFT[x.phone];});
      var doneTab=items.filter(function(x){return isDone(x)&&GIFT[x.phone];});
      subHtml='<div class="section"><div class="sec-hdr">'+lbl+'</div><div class="sub-tabs">';
      var tabs=[['pending','📞 需回访',pending.length],['review','🎁 赠送好评',reviewTab.length],['done','✅ 已完成',doneTab.length]];
      tabs.forEach(function(tb){var k=tb[0],n=tb[1],c=tb[2];var cls='sub-tab'+(curFupTab===k?' active':'');subHtml+='<div class="'+cls+'" onclick="setFupTab(\''+k+'\')">'+n+' · '+c+'</div>';});
      subHtml+='</div>';
      var curFupItems=curFupTab==='review'?reviewTab:curFupTab==='done'?doneTab:pending;
      if(curFupItems.length)curFupItems.forEach(function(t){subHtml+=taskHtml(t);});
      else subHtml+='<div style="padding:14px;color:#999;font-size:12px;text-align:center">这一组暂无任务</div>';
      subHtml+='</div>';html+=subHtml;return;
    }
    else if(t==='confirm'){items=D.customers.filter(function(x){return needConfirm(x);}).map(function(c){return{type:'confirm',phone:c.phone,nick:c.nick,bitableMember:c.bitableMember,seats:c.seats,isHere:c.isHere};});}
    else{items=D.tasks.filter(function(x){return x.type===t;});}
    if(!items.length)return;any=true;
    var pending=items.filter(function(x){return!isDone(x)&&!(x.type==='meeting_remind'&&x.isHere);}).length;var all=items.length;
    html+='<div class="section"><div class="sec-hdr">'+lbl+' · <span style="color:#34a853">已完成 '+(all-pending)+'</span> / 待处理 '+pending+'</div>';
    items.sort(function(a,b){return isDone(a)-isDone(b);}).forEach(function(t){html+=taskHtml(t);});
    html+='</div>';
  });
  return any?html:'<div style="text-align:center;color:#34a853;padding:40px;font-size:16px">🎉 今天没有需要处理的任务</div>';
}
function renderPatrol(){var html='';
  var checks=D.tasks.filter(function(x){return x.type==='meeting_check';});
  if(checks.length){html+='<div class="section"><div class="sec-hdr">🏢 会议室检查</div>';
    checks.forEach(function(t){html+=taskHtml(t);});html+='</div>';
  }
  html+='<div class="section"><div class="sec-hdr">🔄 定时巡店</div>';
  html+=D.tasks.filter(function(x){return x.type==='patrol';}).map(function(p,i){var done=PATROL_DONE[p.id];return'<div class="patrol-item"><div class="chk'+(done?' done':'')+'" onclick="togglePatrol(\''+p.id+'\')">'+(done?'✓':'')+'</div><div style="flex:1;font-size:14px;color:'+(done?'#888':'#222')+'">'+esc(p.label)+'</div></div>';}).join('');
  html+='</div>';return html;}
function togglePatrol(id){PATROL_DONE[id]=PATROL_DONE[id]?null:Date.now();localStorage.setItem('bw_patrol',JSON.stringify(PATROL_DONE));render();}
function renderProfiles(){if(!D.profiles.length)return'<div style="text-align:center;color:#34a853;padding:20px">✅ 所有到店客户已有画像</div>';
  return D.profiles.map(function(p){var info=[esc(p.phone)];if(p.seat)info.push(esc(p.seat));if(p.area)info.push(esc(p.area));return'<div class="profile-item" onclick="openProfile(\''+p.phone+'\',\''+(p.nick||'').replace(/'/g,'\\u2019')+'\')"><div><span style="font-weight:600">'+esc(p.nick||p.phone)+'</span><div style="font-size:11px;color:#888">'+info.join(' · ')+'</div></div><span style="color:#1a73e8;flex-shrink:0;margin-left:8px">填写画像 →</span></div>';}).join('');
}
function openProfile(phone,nick){document.querySelectorAll('.modal-bg').forEach(function(m){m.remove();});
  var pf=PROFILES[phone]||{gender:'',type:'',grade:'',note:''};
  var selG=['','男','女'].map(function(v){return'<option value="'+v+'"'+(pf.gender===v?' selected':'')+'>'+(v||'不涉及')+'</option>';}).join('');
  var selT=['','家长','学生','老师','成人办公','其他'].map(function(v){return'<option value="'+v+'"'+(pf.type===v?' selected':'')+'>'+(v||'不涉及')+'</option>';}).join('');
  var selR=['','小学','初高中','大学','研究生'].map(function(v){return'<option value="'+v+'"'+(pf.grade===v?' selected':'')+'>'+(v||'不涉及')+'</option>';}).join('');
  var m=document.createElement('div');m.className='modal-bg';
  m.innerHTML='<div class="modal-box"><h3>👤 '+esc(nick||phone)+'</h3><div style="font-size:12px;color:#888;margin-bottom:8px">'+phone+'</div>'
    +'<label>性别</label><select id="pf_gender">'+selG+'</select>'
    +'<label>类型</label><select id="pf_type">'+selT+'</select>'
    +'<label>年级</label><select id="pf_grade">'+selR+'</select>'
    +'<label>备注</label><textarea id="pf_note">'+esc(pf.note||'')+'</textarea>'
    +'<div class="modal-actions"><button class="btn-cancel" onclick="this.closest(\'.modal-bg\').remove()">取消</button><button class="btn-save" onclick="saveProfile(\''+phone+'\')">💾 保存</button></div></div>';
  document.body.appendChild(m);m.addEventListener('click',function(e){if(e.target===m)m.remove();});
}
function saveProfile(phone){var pf={gender:document.getElementById('pf_gender').value,type:document.getElementById('pf_type').value,grade:document.getElementById('pf_grade').value,note:document.getElementById('pf_note').value.trim()};if(pf.gender||pf.type||pf.grade||pf.note)PROFILES[phone]=pf;else delete PROFILES[phone];localStorage.setItem('bw_profiles',JSON.stringify(PROFILES));document.querySelector('.modal-bg').remove();render();}
function copyScript(el){var text=el.textContent.replace(/📋 复制/,'').trim();navigator.clipboard?.writeText(text).then(function(){var orig=el.style.background;el.style.background='#e8f5e9';setTimeout(function(){el.style.background=orig;},800);});}
function render(){var el=document.getElementById('main');if(curTab==='tasks')el.innerHTML=renderTasks();else if(curTab==='patrol')el.innerHTML=renderPatrol();else if(curTab==='profiles')el.innerHTML=renderProfiles();}
function renderSummary(){document.getElementById('summary').innerHTML='<div class="card red"><div class="val">'+D.wechatCount+'</div><div class="lbl">待加微信</div></div><div class="card purple"><div class="val">'+D.meetCount+'/'+D.mtFullCount+'</div><div class="lbl">会议室提醒(未/全)</div></div><div class="card orange"><div class="val">'+D.followupCount+'</div><div class="lbl">回访(17:00后)</div></div><div class="card green"><div class="val">'+D.totalVisit+'</div><div class="lbl">今日到店</div></div>';}
document.addEventListener('keydown',function(e){if(e.key==='Escape'){var m=document.querySelector('.modal-bg');if(m)m.remove();}});
renderSummary();render();
</script></body></html>
